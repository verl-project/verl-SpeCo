repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.12.2"
    hooks:
      - id: ruff
        args: ["--fix", "--show-fixes", "--output-format=full"]
        exclude: ^(examples/|tests/|ci/|.*\.(ipynb)$)
      - id: ruff-format
        exclude: ^(examples/|tests/|ci/)

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: "v1.17.0"
    hooks:
      - id: mypy
        exclude: ^(examples/|tests/|ci/)

  - repo: local
    hooks:
      # Upstream verl also defines local special_sanity hooks here. In
      # verl-SpeCo, only enable checks that match this repository layout and do
      # not require full upstream verl trainer/docs infrastructure.
      # - id: autogen-trainer-cfg
      #   name: Generate and verify verl/trainer/config/_generated_*.yaml
      #   entry: scripts/generate_trainer_config.sh
      #   language: script
      #   pass_filenames: false

      - id: check-docs-time-info
        name: Check docs Last updated info
        entry: python tests/special_sanity/check_docs_time_info.py
        language: python
        pass_filenames: false

      # - id: check-docstrings
      #   name: Check doc string coverage
      #   entry: python3 tests/special_sanity/check_docstrings.py
      #   language: python
      #   pass_filenames: false

      - id: check-license
        name: Check license
        entry: python tests/special_sanity/check_license.py --directories verl_speco tests
        language: python
        pass_filenames: false

      - id: check-device-api-usage
        name: Check device API usage
        entry: python tests/special_sanity/check_device_api_usage.py --directory ./verl_speco
        language: python
        pass_filenames: false

      - id: check-dataproto-usage
        name: Check DataProto usage
        entry: python tests/special_sanity/check_dataproto_usage.py -d ./verl_speco
        language: python
        pass_filenames: false

      - id: validate-structure
        name: Validate test structure
        entry: python tests/special_sanity/validate_structure.py --impl-root verl_speco --tests-root tests --allow-dirs compat config examples heavy integration unit special_sanity
        language: python
        pass_filenames: false

      - id: check-naming-conventions
        name: Check naming conventions
        entry: python tests/special_sanity/check_naming_conventions.py
        language: python
        pass_filenames: false

      - id: check-example-naming
        name: Check example script naming convention
        entry: python tests/special_sanity/check_example_naming.py --root examples --repo-root .
        language: python
        pass_filenames: false

      - id: compileall
        name: Compile all python files
        entry: python tests/special_sanity/compile_all.py
        language: python
        pass_filenames: false
